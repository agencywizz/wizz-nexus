# Alembic configuration for Knowledge Base remote Postgres migrations.
# The actual database URL is injected at runtime by auto_migrator.py — this
# file exists only to provide the script_location and mako_template_file settings.

[alembic]
script_location = %(here)s
version_locations = %(here)s/versions
file_template = %%(rev)s_%%(slug)s
truncate_slug_length = 40
timezone = UTC
